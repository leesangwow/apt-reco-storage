name: Load Transaction CSV

on:
  push:
    paths:
      - 'data/updates/*.csv'

jobs:
  load:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas psycopg2-binary python-dotenv tqdm

      - name: Load CSVs to Supabase
        env:
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python scripts/load_csv.py --dir ./data/updates

      - name: Move processed CSVs
        run: |
          mkdir -p data/processed
          for f in data/updates/*.csv; do
            [ -f "$f" ] || continue
            date=$(date +%Y%m%d)
            mv "$f" "data/processed/${date}_$(basename $f)"
          done

      - name: Commit processed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/updates/ data/processed/
          git diff --staged --quiet || git commit -m "chore: move processed CSVs [$(date +%Y-%m-%d)]"
          git push
