name: Load Transaction CSV

on:
  push:
    paths:
      - 'data/updates/*.csv'

jobs:
  load:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas psycopg2-binary python-dotenv tqdm

      - name: Load CSVs to Supabase
        env:
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PORT: ${{ secrets.SUPABASE_DB_PORT }}
          SUPABASE_DB_NAME: ${{ secrets.SUPABASE_DB_NAME }}
          SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python scripts/load_csv.py --dir ./data/updates

      - name: Print summary
        run: echo "CSV 적재 완료. data/updates/ 의 파일을 수동으로 data/processed/ 로 이동 후 push 해주세요."
